# 开发环境配置
spring:
  profiles:
    active: dev
  # 应用基本信息
  application:
    name: flight-api
  # 数据源配置 (MySQL)
  datasource:
    url: jdbc:mysql://localhost:3306/flight_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    # Hikari连接池配置 (Spring Boot默认使用Hikari)
    hikari:
      pool-name: HikariCP
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 600000
      connection-timeout: 30000
  # JPA/Hibernate配置
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: true
    hibernate:
      ddl-auto: none # 开发环境可以用update，生产环境应该用validate或none
    properties:
      hibernate:
        "[format_sql]": true
        jdbc:
          lob:
            # 避免Hibernate的LOB创建警告
            "[non_contextual_creation]": true
    defer-datasource-initialization: true
  sql:
    init:
      mode: never # always: 总是执行SQL初始化脚本
      encoding: UTF-8

# 日志配置，输出到文件
logging:
  file:
    name: logs/application.log
  level:
    root: INFO
    "[org.springframework.web]": INFO
    "[com.example.flightapi]": DEBUG
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"

# 自定义配置
app:
  api:
    version: v1
  cors:
    allowed-origins: "http://localhost:3000, http://127.0.0.1:3000"
    allowed-methods: "GET, POST, PUT, DELETE, OPTIONS"
    allowed-headers: "*"

# JWT配置
jwt:
  # 密钥（从环境变量获取，如果不存在则使用默认值）
  secret: ${JWT_SECRET:your_jwt_secret_key_here_change_in_production}
  # 访问令牌过期时间：30分钟
  access-token:
    expiration: 1800000
  # 刷新令牌过期时间：7天
  refresh-token:
    expiration: 604800000

# Actuator配置 (生产环境需要更严格的security配置)
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
### 关键说明：

# 1. **数据库配置**：
#    - 使用 MySQL 8.x 驱动 (`com.mysql.cj.jdbc.Driver`)
#    - 包含时区设置 (`serverTimezone=UTC`)
#    - 禁用 SSL (`useSSL=false`)

# 2. **连接池**：
#    - 使用 Spring Boot 默认的 HikariCP
#    - 配置了合理的连接池大小

# 3. **JPA/Hibernate**：
#    - 适合开发环境的 `ddl-auto: update`
#    - 显示 SQL 日志并格式化

# 4. **日志**：
#    - 配置了文件输出和格式
#    - 设置了不同包的日志级别

# 5. **其他**：
#    - 文件上传大小限制
#    - CORS 配置
#    - Actuator 端点暴露

# 生产环境需要调整：
# - 数据库密码应该使用加密或从环境变量获取
# - `ddl-auto` 应该改为 `validate` 或 `none`
# - 更严格的 Actuator 安全设置
# - 禁用开发专用的调试选项
